<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal Login | Reptile & Exotic Pet Veterinary Clinic</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;540;550;560;580;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        .form-group { margin-bottom: 24px; text-align: left; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--color-primary); }
        body.dark-mode .form-label { color: var(--color-secondary); }
        .form-control { width: 100%; padding: 16px; border: 1px solid rgba(120, 120, 120, 0.4) !important; border-radius: 8px; font-family: inherit; font-size: 16px; background-color: var(--surface-color); color: var(--text-color); transition: border-color 0.3s; }
        body.dark-mode .form-control { border: 1px solid rgba(255, 255, 255, 0.2) !important; }
        .form-control:focus { outline: none; border-color: var(--color-accent) !important; }
        .icon-btn:hover { background-color: var(--color-primary) !important; color: #fff !important; }
        .hover-link { transition: color 0.3s ease; }
        .hover-link:hover { color: var(--color-primary) !important; text-decoration: underline !important; }
        .btn:hover { border-color: var(--color-primary) !important; color: var(--color-primary) !important; }
        .btn-primary:hover { background-color: var(--color-accent) !important; color: #fff !important; border-color: var(--color-accent) !important; }
        .social-btn { flex: 1; background: transparent; border: 1px solid rgba(120, 120, 120, 0.4) !important; color: var(--text-color); display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.3s; padding: 12px; border-radius: 8px; cursor: pointer; }
        body.dark-mode .social-btn { border-color: rgba(255, 255, 255, 0.2) !important; }
        .social-btn:hover { border-color: var(--color-primary) !important; background-color: var(--color-primary) !important; color: #fff !important; }
        @media (max-width: 480px) {
            .top-controls { top: 16px !important; inset-inline-end: 16px !important; }
            .auth-card { padding: 32px 24px !important; margin-top: 64px; }
        }
    </style>
</head>
<body>

    <!-- Absolute Top Right Controls -->
    <div class="top-controls" style="position: absolute; top: 24px; inset-inline-end: 24px; display: flex; gap: 16px; z-index: 100;">
        <button class="icon-btn dark-mode-toggle" aria-label="Toggle Dark Mode" style="background: var(--surface-color); border: 1px solid rgba(22,56,50,0.1); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="icon-btn rtl-toggle" aria-label="Toggle RTL" style="background: var(--surface-color); border: 1px solid rgba(22,56,50,0.1); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3L4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/></svg>
        </button>
    </div>

    <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background-color: var(--bg-color);">
        <div class="card reveal auth-card" style="width: 100%; max-width: 500px; padding: 48px; text-align: center;">
            <div class="logo" style="margin-bottom: 24px; display: flex; justify-content: center;">
                <a href="index.html">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M12 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3Z"></path><path d="M19 8a2 2 0 0 0-2 2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0-2-2Z"></path><path d="M5 8a2 2 0 0 0-2 2 2 2 0 0 0 2 2 2 2 0 0 0 2-2 2 2 0 0 0-2-2Z"></path><path d="M12 22c-4 0-7-2-7-5 0-3 2-6 7-6s7 3 7 6-3 5-7 5Z"></path></svg>
                    Exotic<span>Vet</span>
                </a>
            </div>
            
            <h2 style="font-size: 20px; margin-bottom: 8px;">Welcome Back</h2>
            <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 32px;">Login to access your patient portal</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div style="position: relative;">
                        <input type="password" class="form-control" placeholder="Enter password" required>
                        <span style="position: absolute; inset-inline-end: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </span>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div style="display: flex; align-items: center;">
                        <input type="checkbox" id="remember" style="margin-inline-end: 8px; accent-color: var(--color-primary);">
                        <label for="remember" style="font-size: 14px; color: var(--text-muted); margin-bottom: 0;">Remember me</label>
                    </div>
                    <a href="#" class="hover-link" style="font-size: 14px; color: var(--color-accent); font-weight: 500; text-decoration: none;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 24px; font-weight: 500;">Log In</button>
                
                <div style="position: relative; text-align: center; margin-bottom: 24px;">
                    <hr style="border: none; border-top: 1px solid rgba(22,56,50,0.1);">
                    <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--surface-color); padding: 0 16px; font-size: 14px; color: var(--text-muted); white-space: nowrap;">Or login with</span>
                </div>
                
                <div style="display: flex; gap: 16px; margin-bottom: 32px;">
                    <button type="button" class="social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"></path></svg> Google
                    </button>
                    <button type="button" class="social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12c0-5.523-4.477-10-10-10z"></path></svg> Apple
                    </button>
                </div>
                
                <p style="margin: 0; font-size: 14px; color: var(--text-muted);">Don't have an account? <a href="register.html" class="hover-link" style="color: var(--color-accent); font-weight: 500; text-decoration: none;">Sign up</a></p>
            </form>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
